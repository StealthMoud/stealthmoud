<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" fill="none">
  <defs>
    <linearGradient id="status-card-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#30363D" />
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#30363D" />
    </linearGradient>
    <linearGradient id="progress-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#9a93ff" />
    </linearGradient>
  </defs>
  <rect width="495" height="195" rx="6" fill="#0D1117" stroke="url(#status-card-border)" stroke-width="1.2"/>
  <style>
    .term-lbl { font-family: Consolas, "Fira Code", Monaco, monospace; font-size: 11px; fill: #8b949e; }
    .term-val { font-family: Consolas, "Fira Code", Monaco, monospace; font-size: 11px; fill: #c9d1d9; }
    .term-cmd { font-family: Consolas, "Fira Code", Monaco, monospace; font-size: 11px; fill: #6366f1; font-weight: bold; }
    .term-bar { font-family: Consolas, "Fira Code", Monaco, monospace; font-size: 11px; fill: #6366f1; }
    .window-title { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; font-size: 10px; fill: #8b949e; animation: fade-in 0.5s ease-out 0.2s both; }
    .win-btn {
      animation: slide-down 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.2) both;
      transform-box: fill-box;
      transform-origin: center;
    }
    .window-divider {
      animation: scale-x 0.5s cubic-bezier(0.175, 0.885, 0.32, 1) 0.25s both;
      transform-box: fill-box;
      transform-origin: center;
    }
    .term-line {
      animation: term-slide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.1) both;
      transform-box: fill-box;
      transform-origin: left center;
    }
    .bar-fill {
      animation: bar-grow 1s cubic-bezier(0.1, 0.8, 0.2, 1) 0.6s both;
      transform-box: fill-box;
      transform-origin: left center;
    }
    .bottom-bar {
      animation: slide-up 0.5s ease-out 0.9s both;
      transform-box: fill-box;
      transform-origin: bottom center;
    }
    .cursor {
      animation: blink 1.2s step-end infinite;
      fill: #6366f1;
    }
    .pulse-dot {
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes blink {
      from, to { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes pulse {
      0% { opacity: 0.4; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.15); }
      100% { opacity: 0.4; transform: scale(0.95); }
    }
    @keyframes slide-down {
      from { opacity: 0; transform: translateY(-4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes scale-x {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
    @keyframes term-slide {
      from { opacity: 0; transform: translateX(-8px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes bar-grow {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
  </style>
  <circle cx="15" cy="15" r="4" fill="#f87171" opacity="0.8" class="win-btn" style="animation-delay: 0.05s;"/>
  <circle cx="27" cy="15" r="4" fill="#fbbf24" opacity="0.8" class="win-btn" style="animation-delay: 0.1s;"/>
  <circle cx="39" cy="15" r="4" fill="#34d399" opacity="0.8" class="win-btn" style="animation-delay: 0.15s;"/>
  <text x="60" y="18" class="window-title">system_monitor.sh</text>
  <line x1="0" y1="28" x2="495" y2="28" stroke="#30363D" stroke-width="1" class="window-divider"/>
  <text x="15" y="47" class="term-cmd term-line" style="animation-delay: 0.25s;">$ ./stealthmoud --status</text>
  <text x="15" y="68" class="term-lbl term-line" style="animation-delay: 0.35s;">TIMEZONE     :</text>
  <text x="120" y="68" class="term-val term-line" style="animation-delay: 0.35s;">Europe/Rome (UTC+2)</text>
  <text x="15" y="86" class="term-lbl term-line" style="animation-delay: 0.45s;">SYSTEM SYNC  :</text>
  <text x="120" y="86" class="term-val term-line" style="animation-delay: 0.45s;">2026-07-23 22:06:27<tspan fill="#6366f1" class="cursor">█</tspan></text>
  <text x="15" y="104" class="term-lbl term-line" style="animation-delay: 0.55s;">YEAR PROGRESS:</text>
  <rect x="120" y="97" width="130" height="8" rx="4" fill="#161b22" stroke="#30363D" stroke-width="0.8" class="term-line" style="animation-delay: 0.55s;"/>
  <rect x="120" y="97" width="72.65753424657534" height="8" rx="4" fill="url(#progress-gradient)" class="bar-fill"/>
  <text x="260" y="104" class="term-val term-line" style="animation-delay: 0.55s;">55.89%</text>
  <text x="15" y="122" class="term-lbl term-line" style="animation-delay: 0.65s;">LAST UPDATE  :</text>
  <text x="120" y="122" class="term-val term-line" style="animation-delay: 0.65s;">refactor: optimize dictionary fe...</text>
  <text x="15" y="140" class="term-lbl term-line" style="animation-delay: 0.75s;">CPU / MEM    :</text>
  <text x="120" y="140" class="term-val term-line" style="animation-delay: 0.75s;">5.1% | 0.90 GB / 15.6 GB</text>
  <rect x="0" y="170" width="495" height="25" fill="#161b22" opacity="0.3" class="bottom-bar"/>
  <line x1="0" y1="170" x2="495" y2="170" stroke="#30363D" stroke-width="1" class="bottom-bar"/>
  <g style="transform-origin: 15px 182px; transform-box: fill-box;" class="pulse-dot bottom-bar">
    <circle cx="15" cy="182" r="3.5" fill="#34d399"/>
  </g>
  <text x="26" y="185" class="term-val bottom-bar" style="animation-delay: 0.95s;">Active: Working on Spelt</text>
  <text x="480" y="185" class="term-lbl bottom-bar" text-anchor="end" style="animation-delay: 0.95s;">Uptime: 237d 6h 17m</text>
</svg>