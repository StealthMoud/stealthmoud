<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" fill="none">
  <defs>
    <linearGradient id="langs-card-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#30363D" />
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#30363D" />
    </linearGradient>
    <mask id="bar-mask">
      <rect x="25" y="52" width="445" height="10" rx="5" fill="#ffffff" />
    </mask>
  </defs>
  <rect width="495" height="195" rx="6" fill="#0D1117" stroke="url(#langs-card-border)" stroke-width="1.2"/>
  <style>
    .title { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; font-size: 14px; font-weight: bold; fill: #6366f1; animation: fadein 0.5s ease-out both; }
    .lang-lbl { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; font-size: 11px; fill: #c9d1d9; font-weight: bold; }
    .lang-pct { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif; font-size: 11px; fill: #8b949e; }
    .bar-segment {
      animation: bar-grow 0.8s cubic-bezier(0.1, 0.8, 0.2, 1) both;
      transform-box: fill-box;
      transform-origin: left center;
    }
    @keyframes fadein { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes bar-grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  </style>
  <text x="25" y="35" class="title">Most Used Languages</text>
</svg>