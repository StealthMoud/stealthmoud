<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" fill="none">
  <defs>
    <linearGradient id="status-card-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#30363D" />
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#30363D" />
    </linearGradient>
  </defs>
  <rect width="495" height="195" rx="6" fill="#0D1117" stroke="url(#status-card-border)" stroke-width="1.2"/>
  <style>
    .term-lbl { font-family: Consolas, "Fira Code", Monaco, monospace; font-size: 11px; fill: #8b949e; }
    .term-val { font-family: Consolas, "Fira Code", Monaco, monospace; font-size: 11px; fill: #c9d1d9; }
    .term-cmd { font-family: Consolas, "Fira Code", Monaco, monospace; font-size: 11px; fill: #6366f1; font-weight: bold; }
    .term-bar { font-family: Consolas, "Fira Code", Monaco, monospace; font-size: 11px; fill: #6366f1; }
    .window-title { font-family: -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; font-size: 10px; fill: #8b949e; }
    .cursor {
      animation: blink 1.2s step-end infinite;
      fill: #6366f1;
    }
    .pulse-dot {
      animation: pulse 1.8s ease-in-out infinite;
    }
    @keyframes blink {
      from, to { opacity: 0; }
      50% { opacity: 1; }
    }
    @keyframes pulse {
      0% { opacity: 0.4; transform: scale(0.95); }
      50% { opacity: 1; transform: scale(1.15); }
      100% { opacity: 0.4; transform: scale(0.95); }
    }
  </style>
  <circle cx="15" cy="15" r="4" fill="#f87171" opacity="0.8"/>
  <circle cx="27" cy="15" r="4" fill="#fbbf24" opacity="0.8"/>
  <circle cx="39" cy="15" r="4" fill="#34d399" opacity="0.8"/>
  <text x="60" y="18" class="window-title">system_monitor.sh</text>
  <line x1="0" y1="28" x2="495" y2="28" stroke="#30363D" stroke-width="1"/>
  <text x="15" y="47" class="term-cmd">$ ./stealthmoud --status</text>
  <text x="15" y="68" class="term-lbl">TIMEZONE     :</text>
  <text x="120" y="68" class="term-val">Europe/Rome (UTC+2)</text>
  <text x="15" y="86" class="term-lbl">SYSTEM SYNC  :</text>
  <text x="120" y="86" class="term-val">2026-06-15 19:44:49</text>
  <rect x="238" y="77" width="2" height="10" class="cursor"/>
  <text x="15" y="104" class="term-lbl">YEAR PROGRESS:</text>
  <text x="120" y="104" class="term-bar">█████████░░░░░░░░░░░</text>
  <text x="260" y="104" class="term-val">45.48%</text>
  <text x="15" y="122" class="term-lbl">LAST UPDATE  :</text>
  <text x="120" y="122" class="term-val">fix uptime layout truncation and...</text>
  <text x="15" y="140" class="term-lbl">CPU / MEM    :</text>
  <text x="120" y="140" class="term-val">43.2% | 14.81 GB / 24.0 GB</text>
  <rect x="0" y="170" width="495" height="25" fill="#161b22" opacity="0.3"/>
  <line x1="0" y1="170" x2="495" y2="170" stroke="#30363D" stroke-width="1"/>
  <g style="transform-origin: 15px 182px; transform-box: fill-box;" class="pulse-dot">
    <circle cx="15" cy="182" r="3.5" fill="#34d399"/>
  </g>
  <text x="26" y="185" class="term-val">Active: Working on stealthmoud</text>
  <text x="480" y="185" class="term-lbl" text-anchor="end">Uptime: 199d 3h 56m</text>
</svg>