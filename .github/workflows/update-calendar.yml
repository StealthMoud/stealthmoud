name: Update Profile Metrics

on:
  schedule:
    - cron: "0 * * * *" # Run every hour to keep status and commits real-time
  workflow_dispatch:

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sync Profile Metrics
        run: python sync_profile.py
        env:
          GH_PAT: ${{ secrets.GH_PAT }}

      - name: Commit and Push Changes
        run: |
          git config --global user.name "StealthMoud"
          git config --global user.email "stealthmoud@users.noreply.github.com"
          git add .
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes in profile metrics."
          else
            git commit -m "refresh profile metrics and status monitor"
            git push origin main
          fi
