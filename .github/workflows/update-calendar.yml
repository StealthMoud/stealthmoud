name: Update Contribution Calendar

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  update-calendar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate Calendar SVG
        run: python generate_calendar.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "StealthMoud"
          git config --global user.email "stealthmoud@users.noreply.github.com"
          git add contributions.svg streak.svg
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes in contribution graph."
          else
            git commit -m "update contribution graph"
            git push origin main
          fi
