name: Update Profile Metrics

on:
  schedule:
    - cron: "0 */6 * * *" # Run every 6 hours to keep status and commits real-time
  workflow_dispatch:

jobs:
  update-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Sync Profile Metrics
        run: python sync_profile.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "StealthMoud"
          git config --global user.email "stealthmoud@users.noreply.github.com"
          git add contributions.svg streak.svg status.svg README.md
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes in profile metrics."
          else
            git commit -m "refresh profile metrics and status monitor"
            git push origin main
          fi
